<svg width="100%" viewBox="38 144 497 78" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>InLecture logo with icon</title>

  <!-- Outer arc — lightest -->
  <path d="M 44,198 Q 110,106 176,198" fill="none" stroke="#9FE1CB" stroke-width="7.5" stroke-linecap="round"/>
  <!-- Middle arc -->
  <path d="M 62,198 Q 110,124 158,198" fill="none" stroke="#1D9E75" stroke-width="8.5" stroke-linecap="round"/>
  <!-- Inner arc — darkest -->
  <path d="M 82,198 Q 110,146 138,198" fill="none" stroke="#0F6E56" stroke-width="9.5" stroke-linecap="round"/>

  <!-- Amber podium dot -->
  <circle cx="110" cy="208" r="10" fill="#EF9F27"/>
  <circle cx="105" cy="203" r="3" fill="white" opacity=".38"/>

  <!-- Floor -->
  <line x1="44" y1="216" x2="176" y2="216" stroke="#9FE1CB" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="202" y="202" font-family="sans-serif">
    <tspan font-family="'DM Serif Display', Georgia, serif" font-style="italic" font-size="76" font-weight="400" fill="#1D9E75">In</tspan><tspan font-family="'DM Sans', sans-serif" font-size="76" font-weight="500" fill="#2C2C2A" dx="-4">Lecture</tspan>
  </text>

</svg>
