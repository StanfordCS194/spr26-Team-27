<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">InLecture logo — final</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">InLecture final logo with original lecture hall arcs, amber dot, and Your favorite class companion tagline</desc>
  <defs>
    
  </defs>

  <!-- Sparkles -->
  <text x="154" y="100" font-family="sans-serif" font-size="18" fill="#FAC775" style="fill:rgb(250, 199, 117);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:18px;font-weight:400;text-anchor:start;dominant-baseline:auto">✦</text>
  <text x="46" y="124" font-family="sans-serif" font-size="11" fill="#9FE1CB" style="fill:rgb(159, 225, 203);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">✦</text>

  <!-- Outer arc — lightest -->
  <path d="M 44,198 Q 110,106 176,198" fill="none" stroke="#9FE1CB" stroke-width="7.5" stroke-linecap="round" style="fill:none;stroke:rgb(159, 225, 203);color:rgb(0, 0, 0);stroke-width:7.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Middle arc -->
  <path d="M 62,198 Q 110,124 158,198" fill="none" stroke="#1D9E75" stroke-width="8.5" stroke-linecap="round" style="fill:none;stroke:rgb(29, 158, 117);color:rgb(0, 0, 0);stroke-width:8.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Inner arc — darkest -->
  <path d="M 82,198 Q 110,146 138,198" fill="none" stroke="#0F6E56" stroke-width="9.5" stroke-linecap="round" style="fill:none;stroke:rgb(15, 110, 86);color:rgb(0, 0, 0);stroke-width:9.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Amber podium dot -->
  <circle cx="110" cy="208" r="10" fill="#EF9F27" style="fill:rgb(239, 159, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="105" cy="203" r="3" fill="white" opacity=".38" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.38;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Floor -->
  <line x1="44" y1="216" x2="176" y2="216" stroke="#9FE1CB" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(159, 225, 203);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark -->
  <text x="202" y="202" font-family="sans-serif" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <tspan font-family="'DM Serif Display', Georgia, serif" font-style="italic" font-size="76" font-weight="400" fill="#1D9E75" style="fill:rgb(29, 158, 117);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Serif Display&quot;, Georgia, serif;font-size:76px;font-weight:400;font-style:italic;text-anchor:start;dominant-baseline:auto">In</tspan><tspan font-family="'DM Sans', sans-serif" font-size="76" font-weight="500" fill="#2C2C2A" dx="-4" style="fill:rgb(44, 44, 42);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, sans-serif;font-size:76px;font-weight:500;text-anchor:start;dominant-baseline:auto">Lecture</tspan>
  </text>

  <!-- Tagline -->
  <text x="204" y="234" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" letter-spacing=".1em" fill="#888780" style="fill:rgb(136, 135, 128);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, sans-serif;font-size:13px;font-weight:500;text-anchor:start;dominant-baseline:auto">YOUR FAVORITE CLASS COMPANION ✦</text>

</svg>